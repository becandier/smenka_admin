server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # SPA-маршрутизация: всё, что не файл, отдаём index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # кэш статики
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
